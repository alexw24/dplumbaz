<section class="py-12 bg-white">
  <div class="mx-auto max-w-5xl px-4 text-center">
    <h2 class="text-2xl sm:text-3xl font-extrabold text-brand-heading mb-3">
      Serving the Phoenix East Valley
    </h2>
    <p class="text-gray-600 text-base mb-8 max-w-2xl mx-auto">
      Diagnostic Plumbing proudly serves homeowners and businesses throughout Maricopa and Pinal Counties. Click your city to learn more about our local plumbing services.
    </p>

    <ul class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
      {{ range .Site.Params.serviceAreas }}
      <li>
        <a href="{{ .url }}"
           class="flex items-center justify-center gap-1.5 bg-brand-surface hover:bg-brand-nav-hover text-brand-accent hover:text-brand-heading font-medium text-sm rounded-lg px-4 py-3 border border-brand-nav-hover hover:border-brand-surface transition-colors">
          <svg class="w-4 h-4 text-brand-accent flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          {{ .name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</section>
