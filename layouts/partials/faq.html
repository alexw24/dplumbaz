{{ if .Params.faq }}
<section class="py-12 bg-gray-50">
  <div class="mx-auto max-w-3xl px-4">
    <h2 class="text-2xl sm:text-3xl font-extrabold text-gray-900 mb-8 text-center">
      Frequently Asked Questions
    </h2>

    <div class="space-y-3">
      {{ range .Params.faq }}
      <details class="group bg-white border border-gray-200 rounded-lg shadow-sm open:shadow-md transition-shadow">
        <summary class="flex items-center justify-between gap-4 px-5 py-4 cursor-pointer list-none select-none">
          <span class="text-base font-semibold text-gray-800 group-open:text-blue-700 transition-colors">
            {{ .question }}
          </span>
          <span class="flex-shrink-0 text-gray-400 group-open:text-blue-600 transition-colors" aria-hidden="true">
            <svg class="w-5 h-5 transition-transform duration-200 group-open:rotate-180" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </span>
        </summary>
        <div class="px-5 pb-5 pt-2 text-sm text-gray-600 leading-relaxed border-t border-gray-100">
          {{ .answer }}
        </div>
      </details>
      {{ end }}
    </div>
  </div>
</section>

{{/* Inject FAQPage structured data */}}
{{ partial "schema/faq.html" . }}
{{ end }}
