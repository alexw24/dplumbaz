{{ $heroImage := .Params.hero_image }}
<section class="relative bg-blue-900 text-white py-16 text-center overflow-hidden"
  {{ with $heroImage }}style="background-image: url('{{ . }}'); background-size: cover; background-position: center;"{{ end }}>

  {{/* Dark overlay when a background image is set */}}
  {{ with $heroImage }}
  <div class="absolute inset-0 bg-blue-900/75" aria-hidden="true"></div>
  {{ end }}

  <div class="relative mx-auto max-w-4xl px-4">
    <h1 class="text-3xl sm:text-4xl lg:text-5xl font-extrabold leading-tight tracking-tight mb-4">
      {{ .Title }}
    </h1>

    {{ with .Params.hero_subtitle }}
    <p class="text-lg sm:text-xl text-blue-200 mb-8 max-w-2xl mx-auto">{{ . }}</p>
    {{ end }}

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <a href="/contact/"
         class="inline-block border-2 border-white text-white hover:bg-white hover:text-blue-900 font-semibold rounded px-6 py-3 transition-colors">
        Request a Service
      </a>
      <a href="tel:4802201266"
         class="inline-block bg-yellow-500 hover:bg-yellow-400 text-black font-bold rounded px-6 py-3 transition-colors">
        Call Us Now!
      </a>
    </div>
  </div>
</section>
