{{- /* Homepage hero form — JobTread web form */ -}}
<form data-jobtread-web-form="true" data-key="22TM8g8W5YFDSmu6mvMgrCYnzHXEcuNiJj"
  data-success-message="Thank you! We'll be in contact soon."
  class="bg-white rounded-xl shadow-2xl overflow-hidden text-left">

  {{- /* Accent header bar */ -}}
  <div class="bg-brand-accent px-5 py-3">
    <p class="text-xs font-semibold uppercase tracking-widest text-white/80">Free Estimate</p>
    <h2 class="text-lg font-bold text-white leading-tight">Request a Service</h2>
  </div>

  <div class="p-5 space-y-3">
    <label class="block">
      <span class="block text-sm font-medium text-brand-heading mb-0.5">Name <span class="text-red-500">*</span></span>
      <input type="text" required name="contact.name"
        class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-brand-accent transition">
    </label>

    <div class="grid grid-cols-2 gap-3">
      <label class="block">
        <span class="block text-sm font-medium text-brand-heading mb-0.5">Email</span>
        <input type="email" name="contact.custom.22NsehctsKJM"
          class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-brand-accent transition">
      </label>
      <label class="block">
        <span class="block text-sm font-medium text-brand-heading mb-0.5">Phone <span class="text-red-500">*</span></span>
        <input type="tel" required name="contact.custom.22Nsehd3v83v"
          class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-brand-accent transition">
      </label>
    </div>

    <label class="block">
      <span class="block text-sm font-medium text-brand-heading mb-0.5">New client?</span>
      <select name="contact.custom.22PV9rSa3MNb"
        class="w-full rounded border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-brand-accent transition">
        <option value="" disabled selected>Select...</option>
        <option value="Yes">Yes</option>
        <option value="No">No</option>
      </select>
    </label>

    <label class="block">
      <span class="block text-sm font-medium text-brand-heading mb-0.5">Write us a message</span>
      <textarea name="account.custom.22PTccENt3HH" rows="2" placeholder="What can we help you with? Describe the issue or service you need..."
        class="w-full rounded border border-gray-300 px-3 py-2 text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-brand-accent focus:border-brand-accent transition"></textarea>
    </label>

    <button type="submit" data-submit-button="true"
      class="w-full bg-brand-accent hover:bg-brand-heading text-white font-bold py-2.5 rounded tracking-widest text-sm transition cursor-pointer">SCHEDULE A SERVICE</button>
  </div>
</form>
<script async src='https://app.jobtread.com/web-form.js'></script>
