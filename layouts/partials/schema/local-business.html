<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Plumber",
  "@id": "{{ .Site.BaseURL }}#business",
  "name": "{{ .Site.Title }}",
  "url": "{{ .Site.BaseURL }}",
  "telephone": "+14802201266",
  "description": "{{ .Site.Params.description }}",
  "image": "{{ .Site.BaseURL }}images/home-hero.jpeg",
  "priceRange": "$$",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Queen Creek",
    "addressRegion": "AZ",
    "addressCountry": "US"
  },
  "geo": {
    "@type": "GeoCoordinates",
    "latitude": 33.2486,
    "longitude": -111.6343
  },
  "openingHoursSpecification": [{
    "@type": "OpeningHoursSpecification",
    "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday"],
    "opens": "06:00",
    "closes": "19:00"
  }],
  "areaServed": [
    {{ range $i, $area := .Site.Params.serviceAreas }}{{ if $i }},{{ end }}
    {
      "@type": "City",
      "name": "{{ $area.name }}"
    }{{ end }}
  ],
  "hasCredential": [
    {{ range $i, $lic := .Site.Params.licenses }}{{ if $i }},{{ end }}
    {
      "@type": "EducationalOccupationalCredential",
      "name": "ROC {{ $lic.number }} — {{ $lic.type }}",
      "credentialCategory": "license"
    }{{ end }}
  ]
}
</script>

    "https://www.yelp.com/biz/..."
  ]
