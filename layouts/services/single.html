{{ define "main" }}
<article class="max-w-4xl mx-auto px-4 py-12">
  <div class="prose max-w-none">
    {{ .Content }}
  </div>
  {{ with .Params.faq }}
    {{ partial "faq.html" $ }}
  {{ end }}
</article>
<section class="py-12 bg-brand-surface">
  <div class="max-w-xl mx-auto px-4">
    {{ $form := .Params.form | default "generic" }}
    {{ partial (printf "forms/%s.html" $form) . }}
  </div>
</section>
{{ partial "service-areas.html" . }}
{{ partial "cta.html" . }}
{{ end }}
