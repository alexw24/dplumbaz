{{ define "main" }}
<div class="max-w-6xl mx-auto px-4 py-12">
  {{ if .Content }}
  <div class="prose max-w-none mb-12">
    {{ .Content }}
  </div>
  {{ end }}
  <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="block p-6 bg-white rounded-lg shadow hover:shadow-lg transition">
      <h2 class="text-xl font-semibold text-blue-900 mb-2">{{ .Title }}</h2>
      {{ with .Params.description }}<p class="text-gray-600">{{ . }}</p>{{ end }}
    </a>
    {{ end }}
  </div>
</div>
{{ partial "cta.html" . }}
{{ end }}
