{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 py-12">
  {{ if .Content }}
  <div class="prose max-w-none mb-12">
    {{ .Content }}
  </div>
  {{ end }}
  <div class="space-y-8">
    {{ range .Paginator.Pages }}
    <article class="bg-white p-6 rounded-lg shadow">
      <h2 class="text-2xl font-semibold">
        <a href="{{ .RelPermalink }}" class="text-blue-900 hover:text-blue-700">{{ .Title }}</a>
      </h2>
      <time class="text-sm text-gray-500 mt-1 block" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.description }}<p class="mt-3 text-gray-600">{{ . }}</p>{{ end }}
      <a href="{{ .RelPermalink }}" class="inline-block mt-4 text-blue-600 hover:text-blue-800 font-medium">Read more &rarr;</a>
    </article>
    {{ end }}
  </div>
  {{ template "_internal/pagination.html" . }}
</div>
{{ end }}
