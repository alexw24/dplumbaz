{{ define "main" }}
<div class="max-w-4xl mx-auto px-4 py-12">
  <div class="prose max-w-none">
    {{ .Content }}
  </div>
  {{ if .Pages }}
  <div class="grid md:grid-cols-2 gap-6 mt-8">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="block p-6 bg-white rounded-lg shadow hover:shadow-md transition">
      <h2 class="text-xl font-semibold text-blue-900">{{ .Title }}</h2>
      {{ with .Params.description }}<p class="mt-2 text-gray-600">{{ . }}</p>{{ end }}
    </a>
    {{ end }}
  </div>
  {{ end }}
</div>
{{ end }}
